apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
        - name: todo-api
          image: axfortunato/todo-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              value: todo_user
            - name: DB_PASSWORD
              value: todo_pass
            - name: DB_NAME
              value: todo_db
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
