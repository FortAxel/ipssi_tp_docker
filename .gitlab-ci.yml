stages:
  - test
  - build
  - deploy

test-unit:
  image: node:18-alpine
  stage: test
  variables:
    LOG_DIR: /tmp/logs
  script:
    - npm ci
    - npm test

test-integration:
  image: node:18-alpine
  stage: test
  services:
    - postgres:16
  variables:
    POSTGRES_DB: todo_test
    POSTGRES_USER: todo_user
    POSTGRES_PASSWORD: todo_pass
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: todo_test
    DB_USER: todo_user
    DB_PASSWORD: todo_pass
    LOG_DIR: /tmp/logs
  script:
    - npm ci
    - npm run test:integration

build-and-push:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin
    - docker build -t "$DOCKERHUB_USER/todo-api:$CI_COMMIT_SHORT_SHA" -t "$DOCKERHUB_USER/todo-api:latest" .
    - docker push "$DOCKERHUB_USER/todo-api:$CI_COMMIT_SHORT_SHA"
    - docker push "$DOCKERHUB_USER/todo-api:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-k3s:
  stage: deploy
  image: bitnami/kubectl:latest
  needs: [build-and-push]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - kubectl set image deployment/todo-api todo-api="$DOCKERHUB_USER/todo-api:$CI_COMMIT_SHORT_SHA"
    - kubectl rollout status deployment/todo-api --timeout=120s
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
