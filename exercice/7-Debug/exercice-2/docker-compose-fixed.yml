version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_PASSWORD: secret

  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: testdb
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db-data:
